[pytest]
# Pytest configuration

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options (if pytest-cov is installed)
# addopts = --cov=src/linkedin_skill_semantic_transformer --cov-report=html --cov-report=term-missing

# Markers for test organization
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for multiple components
    download: Tests for download_skills module
    search: Tests for find_relevant_skills module
    main: Tests for main orchestration module
    slow: Tests that take significant time
    network: Tests that require network access (mocked)

testpaths = tests
